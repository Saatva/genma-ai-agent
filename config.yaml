# Data Catalog Generator Configuration

# Schema extraction settings
extraction:
  # Tables to include (pattern matching with * wildcard)
  # If specified, ONLY these tables will be processed
  include_tables:
    - magento_*
  
  # Tables to exclude from catalog generation
  exclude_tables:
    - temp_*
    - test_*
  
  # Maximum number of tables to process (null for no limit)
  max_tables: null

# AI Analysis settings
ai_analysis:
  # Temperature for AI model (0.0 - 1.0)
  temperature: 0.3
  
  # Maximum tokens per API call (output limit)
  max_tokens: 8000
  
  # Maximum tokens per chunk (total input + output estimate)
  max_chunk_tokens: 2000
  
  # Batch size for processing tables
  batch_size: 5

# Relationship detection settings
relationship_detection:
  # Minimum confidence score to include a relationship (0.0 - 1.0)
  min_confidence: 0.6
  
  # Naming patterns that suggest relationships
  id_patterns:
    - "_id$"
    - "^id_"
    - "_key$"
    - "^fk_"
  
  # Common relationship suffixes
  common_suffixes:
    - user_id
    - customer_id
    - account_id
    - product_id
    - order_id
    - transaction_id

# Output settings
output:
  # Formats to generate: json, markdown, html
  formats:
    - json
    - markdown
    - html
  
  # Output directory
  directory: ./output
  
  # Include confidence scores in output
  include_confidence: true
  
  # Include timestamp in filenames
  timestamp_filenames: true
